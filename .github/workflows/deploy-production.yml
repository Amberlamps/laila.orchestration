# .github/workflows/deploy-production.yml
# Production deployment workflow for laila.works.
# Triggered on merge to main or manual dispatch.
# Deploys: Next.js (OpenNext), Lambda functions, Terraform infrastructure.

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: 'Skip database migrations'
        required: false
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false # Never cancel a running deployment

permissions:
  id-token: write # For OIDC authentication with AWS
  contents: read
  deployments: write # For GitHub deployment status

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      # --- GitHub Deployment (create early so status can be updated on failure) ---
      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              required_contexts: [],
              auto_merge: false,
              description: `Deploy ${context.sha.substring(0, 7)} to production`,
            });
            return deployment.data.id;

      # --- Checkout & Setup ---
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(npx pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: npx pnpm install --frozen-lockfile

      # --- Type Check & Lint ---
      - name: Type check
        run: npx pnpm typecheck

      - name: Lint
        run: npx pnpm lint

      # --- Build ---
      - name: Build Next.js via OpenNext
        run: npx pnpm build:open-next

      - name: Build Lambda functions
        run: npx pnpm build:lambdas

      - name: Package Lambda functions
        run: npx pnpm deploy:package

      # --- Database Migration ---
      - name: Run database migrations
        if: inputs.skip_migrations != true
        run: npx pnpm drizzle-kit push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # --- AWS Authentication ---
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      # --- Deploy Static Assets to S3 ---
      - name: Upload static assets to S3
        run: |
          aws s3 sync apps/web/.open-next/assets s3://laila-works-static-assets \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

      # --- Terraform ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'

      - name: Terraform Init
        working-directory: infra/environments/production
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/environments/production
        run: terraform plan -out=tfplan
        env:
          TF_VAR_nextjs_deployment_package: '../../../deploy/functions/nextjs-server.zip'
          TF_VAR_timeout_checker_package: '../../../deploy/functions/timeout-checker.zip'
          TF_VAR_dag_reconciler_package: '../../../deploy/functions/dag-reconciler.zip'
          TF_VAR_audit_archiver_package: '../../../deploy/functions/audit-archiver.zip'
          TF_VAR_status_propagation_package: '../../../deploy/functions/status-propagation.zip'

      - name: Terraform Apply
        working-directory: infra/environments/production
        run: terraform apply -auto-approve tfplan

      # --- Post-Deploy Health Check ---
      - name: Health check
        run: npx tsx scripts/health-check.ts
        env:
          HEALTH_CHECK_URL: https://laila.works

      # --- GitHub Deployment Status ---
      - name: Create deployment status (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: 'success',
              description: 'Production deployment succeeded',
              environment_url: 'https://laila.works',
            });

      - name: Create deployment status (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = ${{ steps.deployment.outputs.result }};
            if (deploymentId) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deploymentId,
                state: 'failure',
                description: 'Production deployment failed',
              });
            }
