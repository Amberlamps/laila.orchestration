name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Test & Freshness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(npx pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: npx pnpm install --frozen-lockfile

      # ---------- OpenAPI spec validation ----------

      - name: Lint OpenAPI specification (Spectral)
        run: npx pnpm --filter @laila/api-spec lint:spec

      - name: Check generated types freshness
        run: npx pnpm --filter @laila/api-spec check:freshness

      # ---------- Project-wide checks ----------

      - name: TypeScript type checking
        run: npx pnpm typecheck

      - name: Lint (ESLint)
        run: npx pnpm lint

      - name: Run tests (Vitest)
        run: npx pnpm test
