        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /tasks/{taskId}/dependencies/{dependencyTaskId}:
    delete:
      operationId: removeTaskDependency
      summary: Remove a task dependency
      description: >
        Removes the dependency relationship between the specified task and
        the dependency task.
      tags:
        - Task Dependencies
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskIdParam'
        - $ref: '#/components/parameters/DependencyTaskIdParam'
