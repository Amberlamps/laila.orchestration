    # -----------------------------------------------------------------------
    # Domain entity: Task
    # -----------------------------------------------------------------------
    Task:
      type: object
      description: The smallest unit of work, belonging to a user story
      required:
        - id
        - tenantId
        - userStoryId
        - title
        - description
        - acceptanceCriteria
        - technicalNotes
        - personaId
        - workStatus
        - references
        - version
        - createdAt
        - updatedAt
        - deletedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier (UUID v4)
        tenantId:
          type: string
          format: uuid
          description: Tenant ID (equals the owning user's ID)
        userStoryId:
          type: string
          format: uuid
          description: ID of the parent user story
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: Short summary of the task
        description:
          type:
            - string
            - 'null'
          maxLength: 10000
          description: Detailed description (Markdown supported)
        acceptanceCriteria:
          type: array
          description: List of verifiable criteria for task completion
          items:
            type: string
            minLength: 1
            maxLength: 2000
        technicalNotes:
          type:
            - string
            - 'null'
          maxLength: 10000
          description: Implementation notes for the worker agent (Markdown supported)
        personaId:
          type:
            - string
            - 'null'
          format: uuid
          description: ID of the persona best suited for this task; null if unassigned
        workStatus:
          $ref: '#/components/schemas/WorkStatus'
        references:
          type: array
          description: Links to external resources (docs, specs, examples)
          items:
            $ref: '#/components/schemas/TaskReference'
        version:
          type: integer
          minimum: 0
          description: Optimistic locking version
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the task was created (ISO 8601)
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the task was last updated (ISO 8601)
        deletedAt:
          type:
            - string
            - 'null'
          format: date-time
          description: Soft-delete timestamp; null means not deleted

