    # -----------------------------------------------------------------------
    # Domain entity: Worker
    # -----------------------------------------------------------------------
    Worker:
      type: object
      description: An AI agent that requests and executes work assignments
      required:
        - id
        - tenantId
        - name
        - description
        - isActive
        - lastSeenAt
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier (UUID v4)
        tenantId:
          type: string
          format: uuid
          description: Tenant ID (equals the owning user's ID)
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable worker name (e.g., "agent-backend-01")
        description:
          type:
            - string
            - 'null'
          maxLength: 2000
          description: Description of the worker's purpose or capabilities
        isActive:
          type: boolean
          description: Whether the worker is currently active and available
        lastSeenAt:
          type:
            - string
            - 'null'
          format: date-time
          description: Timestamp of the worker's last heartbeat; null if never seen
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the worker was created (ISO 8601)
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the worker was last updated (ISO 8601)

    CreateWorker:
      type: object
      description: Request body for creating a new worker
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable worker name
        description:
          type:
            - string
            - 'null'
          maxLength: 2000
          description: Description of the worker's purpose or capabilities

    UpdateWorker:
      type: object
      description: >
        Request body for partially updating a worker. All fields except
        version are optional.
      required:
        - version
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable worker name
        description:
          type:
            - string
            - 'null'
          maxLength: 2000
          description: Description of the worker's purpose or capabilities
        version:
          type: integer
          minimum: 0
          description: Current version for optimistic locking

    WorkerResponse:
      type: object
      description: Single-item API response for a worker
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Worker'

    CreateWorkerResponse:
      type: object
      description: >
        Response for worker creation, includes the worker entity and the
        newly generated API key (returned only once).
      required:
        - data
        - apiKey
      properties:
        data:
          $ref: '#/components/schemas/Worker'
        apiKey:
          $ref: '#/components/schemas/CreateApiKeyResponse'

    WorkerListResponse:
      type: object
      description: Paginated list response for workers
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Worker'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

