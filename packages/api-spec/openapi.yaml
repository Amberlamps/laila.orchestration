        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      operationId: deleteWorker
      summary: Delete a worker
      description: >
        Permanently deletes a worker agent. Workers do not use soft-delete.
      tags:
        - Workers
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkerIdParam'
      responses:
        '204':
          description: Worker deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /workers/{workerId}/regenerate-key:
    post:
      operationId: regenerateWorkerKey
      summary: Regenerate a worker's API key
      description: >
        Regenerates the API key for the specified worker. The previous key
        is immediately revoked and a new raw key is returned. This is the
        only time the new raw key is available.
      tags:
        - Workers
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkerIdParam'
      responses:
        '200':
          description: New API key generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # -------------------------------------------------------------------------
  # Personas
  # -------------------------------------------------------------------------
  /personas:
    get:
      operationId: listPersonas
      summary: List personas
      description: >
        Returns a paginated list of personas for the authenticated tenant.
      tags:
        - Personas
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Paginated list of personas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      operationId: createPersona
      summary: Create a persona
      description: >
        Creates a new persona (role definition) for the authenticated tenant.
      tags:
        - Personas
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePersona'
      responses:
        '201':
          description: Persona created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /personas/{personaId}:
    get:
      operationId: getPersona
      summary: Get a persona by ID
      description: Returns a single persona by its unique identifier.
      tags:
        - Personas
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/PersonaIdParam'
      responses:
        '200':
          description: Persona details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      operationId: updatePersona
      summary: Update a persona
      description: >
        Partially updates a persona. Requires the current `version` for
        optimistic locking. Only provided fields are updated.
      tags:
        - Personas
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/PersonaIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePersona'
      responses:
        '200':
          description: Persona updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      operationId: deletePersona
      summary: Delete a persona
      description: >
        Permanently deletes a persona. Personas do not use soft-delete.
      tags:
        - Personas
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/PersonaIdParam'
      responses:
        '204':
          description: Persona deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # -------------------------------------------------------------------------
  # Work Orchestration
  # -------------------------------------------------------------------------
  /work/next:
    post:
      operationId: getNextWorkAssignment
      summary: Get next work assignment
      description: >
        Requests the next available work assignment for the authenticated worker
        agent. Returns a discriminated union with three possible outcomes:
        "assigned" (work is available), "blocked" (all remaining work is blocked
        by dependencies), or "all_complete" (no more work exists).
      tags:
        - Work Orchestration
      security:
        - apiKeyAuth: []
      responses:
        '200':
          description: Work assignment result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkAssignmentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /work/complete:
    post:
      operationId: completeWorkAssignment
      summary: Complete a work assignment
      description: >
        Reports the completion (or failure) of an assigned work item. Workers
        must provide the user story ID, a terminal status (done or failed),
        and the resource cost incurred. A reason is required when reporting
        failure.
      tags:
        - Work Orchestration
      security:
        - apiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkCompletionRequest'
      responses:
        '200':
          description: Work completion recorded successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # -------------------------------------------------------------------------
  # Audit
  # -------------------------------------------------------------------------
  /audit/{entityId}:
    get:
      operationId: getAuditLog
      summary: Get audit log for an entity
      description: >
        Returns the audit trail for a specific entity, ordered by timestamp
        descending (most recent first). Supports standard pagination.
      tags:
        - Audit
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/EntityIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Paginated list of audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

# ===========================================================================
# COMPONENTS
# ===========================================================================
components:
  # -------------------------------------------------------------------------
  # Security Schemes
  # -------------------------------------------------------------------------
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: >
        Cookie-based session authentication via Google OAuth (Better Auth).
        Used by human operators accessing the UI and management API.

    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >
        API key authentication for worker agents. Keys are prefixed with
        "lw_" and passed in the X-API-Key header.

  # -------------------------------------------------------------------------
  # Path and Query Parameters
  # -------------------------------------------------------------------------
  parameters:
    ProjectIdParam:
      name: projectId
      in: path
      required: true
      description: Unique identifier of the project (UUID)
      schema:
        type: string
        format: uuid

    EpicIdParam:
      name: epicId
      in: path
      required: true
      description: Unique identifier of the epic (UUID)
      schema:
        type: string
        format: uuid

    StoryIdParam:
      name: storyId
      in: path
      required: true
      description: Unique identifier of the user story (UUID)
      schema:
        type: string
        format: uuid

    TaskIdParam:
      name: taskId
      in: path
      required: true
      description: Unique identifier of the task (UUID)
      schema:
        type: string
        format: uuid

    DependencyTaskIdParam:
      name: dependencyTaskId
      in: path
      required: true
      description: Unique identifier of the dependency task to remove (UUID)
      schema:
        type: string
        format: uuid

    WorkerIdParam:
      name: workerId
      in: path
      required: true
      description: Unique identifier of the worker (UUID)
      schema:
        type: string
        format: uuid

    PersonaIdParam:
      name: personaId
      in: path
      required: true
      description: Unique identifier of the persona (UUID)
      schema:
        type: string
        format: uuid

    EntityIdParam:
      name: entityId
      in: path
      required: true
      description: Unique identifier of the entity to query audit events for
      schema:
        type: string

    PageParam:
      name: page
      in: query
      required: false
      description: Page number (1-indexed)
      schema:
        type: integer
        default: 1
        minimum: 1

    LimitParam:
      name: limit
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    SortByParam:
      name: sortBy
      in: query
      required: false
      description: Field name to sort results by
      schema:
        type: string
        default: createdAt

    SortOrderParam:
      name: sortOrder
      in: query
      required: false
      description: Sort direction
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc

  # -------------------------------------------------------------------------
  # Reusable Responses
  # -------------------------------------------------------------------------
  responses:
    BadRequest:
      description: >
        The request body or query parameters failed validation. Check the
        error details for field-level information.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: >
        Authentication is required. Provide a valid session cookie or
        X-API-Key header.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: >
        The authenticated principal does not have permission to perform
        this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: >
        A conflict occurred, typically due to an optimistic locking version
        mismatch, a duplicate resource, or an invalid state transition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: An unexpected internal server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # -------------------------------------------------------------------------
  # Schemas
  # -------------------------------------------------------------------------
  schemas:
    # -----------------------------------------------------------------------
    # Enums
    # -----------------------------------------------------------------------
    ProjectLifecycleStatus:
      type: string
      description: Project lifecycle phase
      enum:
        - draft
        - planning
        - ready
        - active
        - completed
        - archived

    WorkStatus:
      type: string
      description: Execution status for work items (epics, user stories, tasks)
      enum:
        - pending
        - blocked
        - ready
        - in_progress
        - review
        - done
        - failed
        - skipped

    Priority:
      type: string
      description: Scheduling priority level for work items
      enum:
        - critical
        - high
        - medium
        - low

    ErrorCode:
      type: string
      description: Machine-readable error code for programmatic error handling
      enum:
        - VALIDATION_REQUIRED_FIELD
        - VALIDATION_INVALID_FORMAT
        - VALIDATION_OUT_OF_RANGE
        - VALIDATION_INVALID_STATUS_TRANSITION
        - VALIDATION_INVALID_ENUM_VALUE
        - VALIDATION_PAYLOAD_TOO_LARGE
        - AUTH_MISSING_CREDENTIALS
        - AUTH_INVALID_API_KEY
        - AUTH_EXPIRED_TOKEN
        - AUTH_REVOKED_TOKEN
        - AUTHZ_INSUFFICIENT_PERMISSIONS
        - AUTHZ_RESOURCE_ACCESS_DENIED
        - AUTHZ_ROLE_NOT_ALLOWED
        - NOT_FOUND_RESOURCE
        - NOT_FOUND_PROJECT
        - NOT_FOUND_EPIC
        - NOT_FOUND_STORY
        - NOT_FOUND_TASK
        - NOT_FOUND_ROUTE
        - CONFLICT_VERSION_MISMATCH
        - CONFLICT_DUPLICATE_RESOURCE
        - CONFLICT_INVALID_STATE
        - DEPENDENCY_CYCLE_DETECTED
        - DEPENDENCY_UNRESOLVED
        - DEPENDENCY_STILL_REFERENCED
        - DEPENDENCY_MAX_DEPTH_EXCEEDED
        - RATE_LIMIT_EXCEEDED
        - INTERNAL_SERVER_ERROR
        - INTERNAL_SERVICE_UNAVAILABLE

    AuditAction:
      type: string
      description: The action recorded in an audit event
      enum:
        - created
        - updated
        - deleted
        - status_changed
        - assigned
        - completed

    AuditActorType:
      type: string
      description: The type of principal that triggered the audit event
      enum:
        - user
        - worker
        - system

    WorkCompletionStatus:
      type: string
      description: Terminal status a worker can report for a completed assignment
      enum:
        - done
        - failed

    # -----------------------------------------------------------------------
    # Error schemas
    # -----------------------------------------------------------------------
    FieldError:
      type: object
      description: A single field-level validation error
      required:
        - field
        - message
      properties:
        field:
          type: string
          minLength: 1
          description: >
            The request body field that failed validation
            (dot-notation for nested fields)
        message:
          type: string
          minLength: 1
          description: Human-readable description of the validation failure
        code:
          type: string
          minLength: 1
          description: Optional machine-readable error code for programmatic handling

    ErrorResponse:
      type: object
      description: Standardized error response envelope used by all API endpoints
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - requestId
          properties:
            code:
              $ref: '#/components/schemas/ErrorCode'
            message:
              type: string
              minLength: 1
              description: Human-readable error message suitable for logging or display
            details:
              type: array
              description: Optional array of field-level validation errors
              items:
                $ref: '#/components/schemas/FieldError'
            requestId:
              type: string
              format: uuid
              description: Unique request identifier for log correlation and debugging

    # -----------------------------------------------------------------------
    # Pagination metadata
    # -----------------------------------------------------------------------
    PaginationMeta:
      type: object
      description: Pagination metadata included in every list response
      required:
        - page
        - limit
        - total
        - totalPages
        - hasNext
        - hasPrev
      properties:
        page:
          type: integer
          minimum: 1
          description: Current page number (1-indexed)
        limit:
          type: integer
          minimum: 1
          description: Number of items per page
        total:
          type: integer
          minimum: 0
          description: Total number of items matching the query (before pagination)
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages available
        hasNext:
          type: boolean
          description: Whether a next page exists
        hasPrev:
          type: boolean
          description: Whether a previous page exists

    # -----------------------------------------------------------------------
    # Task Reference (nested object used in Task)
    # -----------------------------------------------------------------------
    TaskReference:
      type: object
      description: A link to an external resource relevant to a task
      required:
        - type
        - url
        - title
      properties:
        type:
          type: string
          minLength: 1
          maxLength: 50
          description: Category of the reference (e.g., "doc", "spec", "example")
        url:
          type: string
          format: uri
          maxLength: 2000
          description: URL pointing to the external resource
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable title for display purposes

    # -----------------------------------------------------------------------
    # Domain entity: Project
    # -----------------------------------------------------------------------
    Project:
      type: object
      description: A top-level organizational unit containing epics
      required:
        - id
        - tenantId
        - name
        - description
        - lifecycleStatus
        - workStatus
        - version
        - createdAt
        - updatedAt
        - deletedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier (UUID v4)
        tenantId:
          type: string
          format: uuid
          description: Tenant ID (equals the owning user's ID)
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable project name
        description:
          type:
            - string
            - 'null'
          maxLength: 10000
          description: Detailed project description (Markdown supported)
        lifecycleStatus:
          $ref: '#/components/schemas/ProjectLifecycleStatus'
        workStatus:
          $ref: '#/components/schemas/WorkStatus'
        version:
          type: integer
          minimum: 0
          description: Optimistic locking version
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the project was created (ISO 8601)
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the project was last updated (ISO 8601)
        deletedAt:
          type:
            - string
            - 'null'
          format: date-time
          description: Soft-delete timestamp; null means not deleted

    CreateProject:
      type: object
      description: Request body for creating a new project
      required:
        - name
        - lifecycleStatus
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable project name
        description:
          type:
            - string
            - 'null'
          maxLength: 10000
          description: Detailed project description (Markdown supported)
        lifecycleStatus:
          $ref: '#/components/schemas/ProjectLifecycleStatus'

    UpdateProject:
      type: object
      description: >
        Request body for partially updating a project. All fields except
        version are optional.
      required:
        - version
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable project name
        description:
          type:
            - string
            - 'null'
          maxLength: 10000
          description: Detailed project description (Markdown supported)
        lifecycleStatus:
          $ref: '#/components/schemas/ProjectLifecycleStatus'
        version:
          type: integer
          minimum: 0
          description: Current version for optimistic locking

    ProjectResponse:
      type: object
      description: Single-item API response for a project
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Project'

    ProjectListResponse:
      type: object
      description: Paginated list response for projects
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    # -----------------------------------------------------------------------
    # Domain entity: Epic
    # -----------------------------------------------------------------------
    Epic:
      type: object
      description: A large body of work within a project
      required:
        - id
        - tenantId
        - projectId
        - name
        - description
        - workStatus
        - sortOrder
        - version
        - createdAt
        - updatedAt
        - deletedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier (UUID v4)
        tenantId:
          type: string
          format: uuid
          description: Tenant ID (equals the owning user's ID)
        projectId:
          type: string
          format: uuid
          description: ID of the parent project
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable epic name
        description:
          type:
            - string
            - 'null'
          maxLength: 10000
          description: Detailed epic description (Markdown supported)
        workStatus:
          $ref: '#/components/schemas/WorkStatus'
        sortOrder:
          type: integer
          minimum: 0
          description: Display and scheduling order within the parent project (zero-based)
        version:
          type: integer
          minimum: 0
          description: Optimistic locking version
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the epic was created (ISO 8601)
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the epic was last updated (ISO 8601)
        deletedAt:
          type:
            - string
            - 'null'
          format: date-time
          description: Soft-delete timestamp; null means not deleted

    CreateEpic:
      type: object
      description: >
        Request body for creating a new epic. The projectId is provided via
        the URL path parameter, not in the request body.
      required:
        - name
        - sortOrder
      properties:
        projectId:
          type: string
          format: uuid
          description: ID of the parent project (may also come from URL path)
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable epic name
        description:
          type:
            - string
            - 'null'
          maxLength: 10000
          description: Detailed epic description (Markdown supported)
        sortOrder:
          type: integer
          minimum: 0
          description: Display and scheduling order within the parent project (zero-based)

    UpdateEpic:
      type: object
      description: >
        Request body for partially updating an epic. All fields except
        version are optional.
      required:
        - version
      properties:
        projectId:
          type: string
          format: uuid
          description: ID of the parent project
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable epic name
        description:
          type:
            - string
            - 'null'
          maxLength: 10000
          description: Detailed epic description (Markdown supported)
        sortOrder:
          type: integer
          minimum: 0
          description: Display and scheduling order within the parent project
        version:
          type: integer
          minimum: 0
          description: Current version for optimistic locking

    EpicResponse:
      type: object
      description: Single-item API response for an epic
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Epic'

    EpicListResponse:
      type: object
      description: Paginated list response for epics
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Epic'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    # -----------------------------------------------------------------------
    # Domain entity: UserStory
    # -----------------------------------------------------------------------
    UserStory:
      type: object
      description: A discrete deliverable within an epic, assignable to a worker agent
      required:
        - id
        - tenantId
        - epicId
        - title
        - description
        - priority
        - workStatus
        - costEstimate
        - actualCost
        - assignedWorkerId
        - assignedAt
        - attempts
        - maxAttempts
        - version
        - createdAt
        - updatedAt
        - deletedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier (UUID v4)
        tenantId:
          type: string
          format: uuid
          description: Tenant ID (equals the owning user's ID)
        epicId:
          type: string
          format: uuid
          description: ID of the parent epic
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: Short summary of the user story
        description:
          type:
            - string
            - 'null'
          maxLength: 10000
          description: Detailed description (Markdown supported)
        priority:
          $ref: '#/components/schemas/Priority'
        workStatus:
          $ref: '#/components/schemas/WorkStatus'
        costEstimate:
          type:
            - number
            - 'null'
          minimum: 0
          description: Estimated cost in tokens or credits; null if not estimated
        actualCost:
          type:
            - number
            - 'null'
          minimum: 0
          description: Actual cost incurred during execution; null if not completed
        assignedWorkerId:
          type:
            - string
            - 'null'
          format: uuid
          description: ID of the assigned worker agent; null if unassigned
        assignedAt:
          type:
            - string
            - 'null'
          format: date-time
          description: Timestamp when assigned to a worker; null if unassigned
        attempts:
          type: integer
          minimum: 0
          description: Number of execution attempts made so far
        maxAttempts:
          type: integer
          minimum: 1
          description: Maximum allowed execution attempts before marking as failed
        version:
          type: integer
          minimum: 0
          description: Optimistic locking version
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the user story was created (ISO 8601)
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the user story was last updated (ISO 8601)
        deletedAt:
          type:
