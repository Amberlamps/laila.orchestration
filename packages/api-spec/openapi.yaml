  # -------------------------------------------------------------------------
  # Task Dependencies
  # -------------------------------------------------------------------------
  /tasks/{taskId}/dependencies:
    post:
      operationId: addTaskDependency
      summary: Add a task dependency
      description: >
        Adds a dependency relationship where the specified task depends on
        another task. The system validates that adding this dependency does
        not create a circular reference.
      tags:
        - Task Dependencies
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskIdParam'
      requestBody:
        required: true
        content:
          application/json:
