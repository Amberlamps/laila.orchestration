# openapi.yaml
# Contract-first API specification for the laila.works Orchestration Service
# All REST endpoints are defined here before implementation
openapi: '3.1.0'
info:
  title: laila.works Orchestration Service API
  version: 0.1.0
  description: >
    Contract-first REST API specification for the laila.works orchestration
    service. This API powers an AI work orchestration platform where human
    operators manage projects, epics, user stories, and tasks, while AI worker
    agents poll for and execute work assignments. TypeScript types are generated
    from this spec using openapi-typescript to keep server and client
    implementations in sync.
  contact:
    name: laila.works Engineering
    url: https://laila.works

servers:
  - url: /api/v1
    description: API v1 base path

# ---------------------------------------------------------------------------
# Security schemes
# ---------------------------------------------------------------------------
security:
  - sessionAuth: []

tags:
  - name: Projects
    description: Manage top-level organizational units
  - name: Epics
    description: Manage large bodies of work within projects
  - name: User Stories
    description: Manage discrete deliverables within epics
  - name: Tasks
    description: Manage actionable work items within user stories
  - name: Task Dependencies
    description: Manage dependency relationships between tasks
  - name: Workers
    description: Manage AI worker agents
  - name: Personas
    description: Manage role definitions for task assignment
  - name: Work Orchestration
    description: Work assignment and completion protocol for worker agents
  - name: Audit
    description: Query audit trail events for entities

# ===========================================================================
# PATHS
# ===========================================================================
paths:
  # -------------------------------------------------------------------------
  # Projects
  # -------------------------------------------------------------------------
  /projects:
    get:
      operationId: listProjects
      summary: List projects
      description: >
        Returns a paginated list of projects for the authenticated tenant.
        Supports filtering by lifecycle status and standard pagination/sorting.
      tags:
        - Projects
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortOrderParam'
        - name: status
          in: query
          description: Filter by project lifecycle status
          required: false
          schema:
            $ref: '#/components/schemas/ProjectLifecycleStatus'
      responses:
        '200':
          description: Paginated list of projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      operationId: createProject
      summary: Create a project
      description: >
        Creates a new project for the authenticated tenant. The project starts
        in "draft" lifecycle status with "pending" work status.
      tags:
        - Projects
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProject'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /projects/{projectId}:
    get:
      operationId: getProject
      summary: Get a project by ID
      description: Returns a single project by its unique identifier.
      tags:
        - Projects
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      operationId: updateProject
      summary: Update a project
      description: >
        Partially updates a project. Requires the current `version` for
        optimistic locking. Only provided fields are updated.
      tags:
        - Projects
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProject'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      operationId: deleteProject
      summary: Delete a project
      description: >
        Soft-deletes a project by setting the deletedAt timestamp. The project
        and its children are excluded from normal queries but can be restored.
      tags:
        - Projects
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '204':
          description: Project deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

