        tenantId:
          type: string
          format: uuid
          description: Tenant ID (equals the owning user's ID)
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable persona title (e.g., "Backend Developer")
        description:
          type: string
          maxLength: 10000
          description: Rich description of the persona's role and capabilities (Markdown)
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the persona was created (ISO 8601)
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the persona was last updated (ISO 8601)

    CreatePersona:
      type: object
      description: Request body for creating a new persona
      required:
        - title
        - description
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable persona title
        description:
          type: string
          maxLength: 10000
          description: Rich description of the persona's role and capabilities (Markdown)

    UpdatePersona:
      type: object
      description: >
        Request body for partially updating a persona. All fields except
        version are optional.
      required:
