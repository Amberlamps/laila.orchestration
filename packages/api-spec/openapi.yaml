    # -----------------------------------------------------------------------
    # API Key Management
    # -----------------------------------------------------------------------
    CreateApiKeyRequest:
      type: object
      description: Request body for creating a new API key
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Human-readable name to identify this API key
        expiresAt:
          type: string
          format: date-time
          description: Optional expiration timestamp (ISO 8601). Omit for non-expiring keys.

    CreateApiKeyResponse:
      type: object
      description: >
        Response after creating an API key. The rawKey is only returned once
        at creation time and cannot be retrieved again.
      required:
        - id
        - name
        - rawKey
        - maskedKey
        - createdAt
        - expiresAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the API key record
        name:
          type: string
          description: Human-readable name assigned to this key
        rawKey:
          type: string
          pattern: ^lw_
          description: >
            The full raw API key prefixed with "lw_". Only returned once at
            creation time. Clients must store it securely.
        maskedKey:
          type: string
          description: Masked version of the key for display (e.g., "lw_****...ab12")
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the key was created (ISO 8601)
        expiresAt:
          type:
            - string
            - 'null'
          format: date-time
          description: Expiration timestamp, or null for non-expiring keys

    ApiKeySummary:
      type: object
      description: Summary representation of an API key (excludes raw key)
      required:
        - id
        - name
        - maskedKey
        - createdAt
        - expiresAt
        - lastUsedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the API key record
        name:
          type: string
          description: Human-readable name assigned to this key
        maskedKey:
          type: string
          description: Masked version of the key for display
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the key was created (ISO 8601)
        expiresAt:
          type:
            - string
            - 'null'
          format: date-time
          description: Expiration timestamp, or null for non-expiring keys
        lastUsedAt:
          type:
            - string
            - 'null'
          format: date-time
          description: Timestamp when the key was last used, or null if never used

    # -----------------------------------------------------------------------
    # Work Orchestration: Assignment
    # -----------------------------------------------------------------------
    WorkAssigned:
      type: object
      description: >
        Work assignment response variant when work is available and has been
        assigned to the requesting worker.
      required:
        - type
        - userStory
        - tasks
        - assignedAt
      properties:
        type:
          type: string
          const: assigned
          description: Discriminator indicating work has been assigned
        userStory:
          $ref: '#/components/schemas/UserStory'
        tasks:
          type: array
          description: Ordered list of tasks the worker must complete
          items:
            $ref: '#/components/schemas/Task'
        assignedAt:
          type: string
          format: date-time
          description: Timestamp when the assignment was made (ISO 8601)

    WorkBlocked:
      type: object
      description: >
        Work assignment response variant when all remaining work is blocked
        by unresolved dependencies.
      required:
        - type
        - reason
        - blockedCount
      properties:
        type:
          type: string
          const: blocked
          description: Discriminator indicating all remaining work is blocked
        reason:
          type: string
          description: Human-readable explanation of why work is blocked
        blockedCount:
          type: integer
          minimum: 0
          description: Number of work items currently in blocked state

    WorkAllComplete:
      type: object
      description: >
        Work assignment response variant when every work item has reached
        a terminal state.
      required:
        - type
        - completedAt
      properties:
        type:
          type: string
          const: all_complete
          description: Discriminator indicating all project work is complete
        completedAt:
          type: string
          format: date-time
          description: Timestamp when the last work item completed (ISO 8601)

    WorkAssignmentResponse:
      description: >
        Discriminated union response for the work assignment endpoint.
        Use the "type" field to determine which variant was returned.
      oneOf:
        - $ref: '#/components/schemas/WorkAssigned'
        - $ref: '#/components/schemas/WorkBlocked'
        - $ref: '#/components/schemas/WorkAllComplete'
      discriminator:
        propertyName: type
        mapping:
          assigned: '#/components/schemas/WorkAssigned'
          blocked: '#/components/schemas/WorkBlocked'
          all_complete: '#/components/schemas/WorkAllComplete'

    # -----------------------------------------------------------------------
    # Work Orchestration: Completion
    # -----------------------------------------------------------------------
    WorkCompletionRequest:
      type: object
      description: >
        Request body for reporting work completion. The reason field is
        required when status is "failed".
      required:
        - userStoryId
        - status
        - cost
      properties:
        userStoryId:
          type: string
          format: uuid
          description: UUID of the user story that was assigned to the worker
        status:
          $ref: '#/components/schemas/WorkCompletionStatus'
        cost:
          type: number
          minimum: 0
          description: Resource cost incurred during execution (e.g., API tokens consumed)
        reason:
          type: string
          minLength: 1
          maxLength: 2000
          description: >
            Explanation of the outcome. Required when status is "failed" to
            provide context for debugging and retry decisions.

    # -----------------------------------------------------------------------
    # Audit
    # -----------------------------------------------------------------------
    AuditChangeDiff:
      type: object
      description: A single field-level change showing before and after values
      properties:
        before:
          description: The field value before the change
        after:
          description: The field value after the change

    AuditEvent:
      type: object
      description: An immutable audit trail event recording a state change
      required:
        - eventId
        - entityType
        - entityId
        - action
        - actorType
        - actorId
        - timestamp
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique identifier for this audit event (UUID v4)
        entityType:
          type: string
          minLength: 1
          maxLength: 100
          description: The type of entity acted upon (e.g., "project", "task")
        entityId:
          type: string
          minLength: 1
          maxLength: 255
          description: The unique identifier of the entity acted upon
        action:
          $ref: '#/components/schemas/AuditAction'
        actorType:
          $ref: '#/components/schemas/AuditActorType'
        actorId:
          type: string
          minLength: 1
          maxLength: 255
          description: >
            Unique identifier of the actor (user ID, worker ID, or
            system identifier)
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the event occurred (ISO 8601)
        changes:
          type: object
          description: Record of field-level changes with before/after values
          additionalProperties:
            $ref: '#/components/schemas/AuditChangeDiff'
        metadata:
          type: object
          description: Extensible key-value metadata for additional context
          additionalProperties:
            type: string

    AuditEventListResponse:
      type: object
      description: Paginated list response for audit events
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
